<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: #fff; }
    main { max-width: 980px; margin: 0 auto; padding: 24px 16px 48px; }
    h1, h2, h3, p { margin: 0 0 12px; }
    h1 { font-size: 32px; font-weight: 600; }
    h2 { font-size: 18px; font-weight: 600; }
    p, li, td, th { color: #d8d8d8; }
    .nav, .panel, .notice {
      border: 2px solid #444;
      background: #000;
      padding: 16px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .grid { display: grid; gap: 16px; }
    .two { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .three { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    form { display: grid; gap: 12px; margin: 0; }
    label { display: grid; gap: 6px; font-size: 14px; color: #fff; }
    input {
      width: 100%;
      background: #000;
      color: #fff;
      border: 2px solid #666;
      padding: 10px 12px;
      font: inherit;
    }
    button {
      width: fit-content;
      background: #fff;
      color: #000;
      border: 2px solid #fff;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }
    .button-quiet { background: #000; color: #fff; border-color: #666; }
    .button-danger { background: #000; color: #fff; border-color: #fff; }
    .inline { display: inline-flex; }
    .notice { margin-bottom: 16px; }
    .error { border-color: #888; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 2px solid #222;
      vertical-align: top;
    }
    th { color: #fff; font-weight: 600; }
    code { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; color: #fff; }
    .muted { color: #9a9a9a; font-size: 14px; }
    ul { margin: 0; padding-left: 18px; }
    @media (max-width: 640px) {
      .nav { align-items: flex-start; flex-direction: column; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main>
    {% if session %}
    <div class="nav">
      <div>
        <strong>{{ session.username }}</strong>
        <div class="muted">{{ session.role }}</div>
      </div>
      <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <form method="post" action="/logout" class="inline">
          <input type="hidden" name="csrf" value="{{ session.csrf }}">
          <button class="button-quiet" type="submit">Log out</button>
        </form>
      </div>
    </div>
    {% endif %}

    {% if error %}
    <div class="notice error">{{ error }}</div>
    {% endif %}
    {% if notice %}
    <div class="notice">{{ notice }}</div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
